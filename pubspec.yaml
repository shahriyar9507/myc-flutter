name: myc
description: MyC — Chat with a little weather. A messenger with live animated themes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0
  flutter_svg: ^2.1.0
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.4.0

  # State
  provider: ^6.1.4

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Realtime voice/video
  agora_rtc_engine: ^6.5.1
  permission_handler: ^11.3.1

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  image: ^4.3.0
  flutter_image_compress: ^2.3.0
  video_compress: ^3.1.4
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Device
  local_auth: ^2.3.0
  package_info_plus: ^8.0.2
  device_info_plus: ^11.1.0

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
